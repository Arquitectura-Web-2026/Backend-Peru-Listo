spring.application.name=PeruListo


spring.datasource.url=jdbc:postgresql://localhost:5432/perulisto
spring.datasource.username=postgres
spring.datasource.password=josue
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
#No envia el trace al usuario cuando hay error.
server.error.include-stacktrace=never

# JWT Configuration
jwt.secret=mySecretKey1234567890123456789012345
jwt.expirationMs=86400000
